name: Source Check

on:
  # Weekly — every Monday 09:00 IST (03:30 UTC)
  # Monthly — 1st of each month 09:00 IST (03:30 UTC)
  # Annual — 2nd January 09:00 IST (03:30 UTC)
  schedule:
    - cron: '30 3 * * 1'   # weekly
    - cron: '30 3 1 * *'   # monthly (also fires on Mon 1st — mode logic below handles it)
    - cron: '30 3 2 1 *'   # annual
  workflow_dispatch:
    inputs:
      mode:
        description: 'Check mode'
        required: true
        type: choice
        options: [weekly, monthly, annual]

permissions:
  contents: write   # push commits to main
  issues: write     # open verification-failed issues
  pull-requests: write  # open change PRs

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # opt into Node.js 24 for actions

jobs:
  source-check:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Determine mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ inputs.mode }}" >> "$GITHUB_OUTPUT"
          elif [ "$(date -u +%m-%d)" = "01-02" ]; then
            echo "mode=annual" >> "$GITHUB_OUTPUT"
          elif [ "$(date -u +%d)" = "01" ]; then
            echo "mode=monthly" >> "$GITHUB_OUTPUT"
          else
            echo "mode=weekly" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure git
        run: |
          git config user.name  "Ariviyal Cadence"
          git config user.email "cadence@ariviyalpoatti.in"

      - name: Run source check
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MODE: ${{ steps.mode.outputs.mode }}
          HUSKY: '0'        # skip pre-commit hooks in CI
        run: node scripts/source-check.mjs "$MODE"
